<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CosmoMemória — Jogo da Memória do Universo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/estilo.css') }}">
</head>
<body>

  <!-- fundo de estrelas (preenchido pelo script.js) -->
  <div id="estrelas" class="estrelas"></div>

  <header class="topo">
    <h1 class="marca">CosmoMemória</h1>
    <p class="subtitulo">Jogo da memória do universo</p>
  </header>

  <!-- TELA INICIAL: escolher nivel -->
  <section id="tela-inicial" class="painel">
    <h2 class="painel-titulo">Escolha a dificuldade</h2>
    <div class="niveis">
      <button class="btn-nivel selecionado" data-nivel="facil">
        <span class="nivel-nome">Fácil</span>
        <span class="nivel-info">6 pares</span>
      </button>
      <button class="btn-nivel" data-nivel="medio">
        <span class="nivel-nome">Médio</span>
        <span class="nivel-info">8 pares</span>
      </button>
      <button class="btn-nivel" data-nivel="dificil">
        <span class="nivel-nome">Difícil</span>
        <span class="nivel-info">12 pares</span>
      </button>
    </div>
    <button id="btn-comecar" class="btn-primario">Começar</button>
  </section>

  <!-- TELA DO JOGO -->
  <section id="tela-jogo" class="oculto">
    <div class="placar">
      <div class="placar-item"><span class="placar-num" id="ph-pares">0/0</span><span class="placar-rotulo">Pares</span></div>
      <div class="placar-item"><span class="placar-num" id="ph-tentativas">0</span><span class="placar-rotulo">Tentativas</span></div>
      <div class="placar-item"><span class="placar-num" id="ph-tempo">00:00</span><span class="placar-rotulo">Tempo</span></div>
      <button id="btn-trocar" class="btn-secundario">Trocar nível</button>
    </div>
    <div id="tabuleiro" class="tabuleiro"></div>
  </section>

  <!-- TELA DE VITORIA -->
  <div id="tela-vitoria" class="overlay oculto">
    <div class="caixa-vitoria">
      <div class="vitoria-icone">🏆</div>
      <h2>Você completou!</h2>
      <p class="vitoria-sub">Todos os astros foram encontrados.</p>
      <div class="vitoria-stats">
        <div><span id="v-tempo">00:00</span><small>Tempo</small></div>
        <div><span id="v-tentativas">0</span><small>Tentativas</small></div>
        <div><span id="v-pontos">0</span><small>Pontos</small></div>
      </div>
      <button id="btn-de-novo" class="btn-primario">Jogar de novo</button>
    </div>
  </div>

  <footer class="rodape">
    Projeto da disciplina de Linguagem de Programação • SENAI-SP • 2026
  </footer>

  <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
